<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MOVE — Geo UI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    <style>
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; }
        header { padding: 1rem; background: #1a365d; color: white; }
        header h1 { margin: 0; font-size: 1.25rem; }
        header p { margin: 0.25rem 0 0 0; opacity: 0.8; font-size: 0.875rem; }
        #map { height: calc(100vh - 80px); }
    </style>
</head>
<body>
    <header>
        <h1>MOVE — Panel geográfico</h1>
        <p>Sprint 0 · Esqueleto Leaflet + OpenStreetMap. Zonas y traslados se cargan en Sprint 2-4.</p>
    </header>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <script>
        // Centro Montevideo
        const map = L.map('map').setView([-34.9011, -56.1645], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap',
            maxZoom: 19,
        }).addTo(map);

        // En Sprint 2 (HIST-2.2): cargar zonas activas desde GET /api/admin/zones
        // y dibujarlas con L.geoJSON.
        // En Sprint 4 (HIST-6.4): conectar al WebSocket de move-monitoring para
        // dibujar markers de vehículos activos en tiempo real.
    </script>
</body>
</html>
