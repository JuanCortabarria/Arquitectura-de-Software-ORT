name: ci

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "obligatorio/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main, develop]
    paths:
      - "obligatorio/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: obligatorio

jobs:
  move-api:
    name: move-api · lint + build + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: move
          POSTGRES_PASSWORD: move_local_dev
          POSTGRES_DB: move
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U move -d move"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: obligatorio/services/move-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: obligatorio/services/move-api/package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm test --if-present

  move-classification:
    name: move-classification · lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: obligatorio/services/move-classification
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: obligatorio/services/move-classification/requirements.txt
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - run: python -c "from app.factory import build_classifier; build_classifier('tfidf').classify('monitor de pc')"

  move-gps-ingestion:
    name: move-gps-ingestion · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: obligatorio/services/move-gps-ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: obligatorio/services/move-gps-ingestion/package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm test --if-present

  move-monitoring:
    name: move-monitoring · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: obligatorio/services/move-monitoring
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: obligatorio/services/move-monitoring/package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm test --if-present

  docker-compose:
    name: docker compose · sanity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
