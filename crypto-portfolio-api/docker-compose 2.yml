version: '3.8'

# Orquestación de servicios para Parte 4:
#   - mysql:   Base de datos relacional para Asset (Sequelize)
#   - mongodb: Base de datos documental para AuditLog (Mongoose)
#   - api:     API REST Node.js/Express
#
# Uso:
#   docker compose up         → levanta los 3 servicios
#   docker compose down       → detiene y elimina contenedores
#   docker compose down -v    → también elimina los volúmenes (datos)

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: crypto_portfolio
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      CRYPTO_API_URL: https://min-api.cryptocompare.com/data/price
      # MySQL — los nombres de host son los nombres de servicio de Docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: secret
      MYSQL_DATABASE: crypto_portfolio
      # MongoDB
      MONGODB_URI: mongodb://mongodb:27017/crypto_portfolio
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy

volumes:
  mysql_data:
  mongo_data:
